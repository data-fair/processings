services:

  #####
  # reverse proxy for the whole environment
  #####
  nginx:
    image: nginx:1.29.4-alpine
    network_mode: host
    volumes:
      - ./dev/resources/nginx.conf:/etc/nginx/nginx.conf:ro

  #####
  # related services from the data-fair stack
  #####

  simple-directory:
    profiles:
      - dev
      - test
    image: ghcr.io/data-fair/simple-directory:8
    network_mode: host
    depends_on:
      - mongo
    environment:
      - DEBUG=session
      - CONTACT=contact@test.com
      - ADMINS=["superadmin@test.com"]
      - PUBLIC_URL=http://localhost:5600/simple-directory
      - MAILDEV_ACTIVE=true
      - MONGO_URL=mongodb://localhost:27017/simple-directory
      - STORAGE_TYPE=file
      - AUTHRATELIMIT_ATTEMPTS=500
      - AUTHRATELIMIT_DURATION=30
      - OBSERVER_ACTIVE=false
      - MANAGE_PARTNERS=true
      - MANAGE_DEPARTMENTS=true
      - CIPHER_PASSWORD=dev
    volumes:
      - ./dev/resources/users.json:/app/data/users.json
      - ./dev/resources/organizations.json:/app/data/organizations.json

  data-fair:
    profiles:
      - dev
      - test
    image: ghcr.io/data-fair/data-fair:5
    restart: on-failure:10
    network_mode: host
    depends_on:
      mongo:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    environment:
      - PORT=8081
      - MONGO_URL=mongodb://localhost:27017/data-fair
      - DIRECTORY_URL=http://localhost:5600/simple-directory
      - PRIVATE_EVENTS_URL=http://localhost:8083
      - PRIVATE_DIRECTORY_URL=http://localhost:8080
      - PUBLIC_URL=http://localhost:5600/data-fair
      - WS_PUBLIC_URL=ws://localhost:5600/data-fair
      - OBSERVER_ACTIVE=false

      - PRIVATE_PROCESSINGS_URL=http://localhost:8082
      - SECRET_EVENTS=secret-events
      - EXTRA_ADMIN_NAV_ITEMS=[{"id":"processingsAdminDoc","href":"http://localhost:5600/openapi-viewer?urlType=processingsAdmin","icon":"mdi-cog-transfer-outline","title":"API Traitements périodiques"}]
      - OPENAPI_VIEWER_URL=http://localhost:5600/openapi-viewer/
      - OPENAPI_VIEWER_V2=true

  #####
  # optional services
  #####

  events:
    profiles:
      - dev
    image: ghcr.io/data-fair/events:main
    network_mode: host
    environment:
      - PORT=8083
      - MONGO_URL=mongodb://localhost:27017/data-fair-events
      - PRIVATE_DIRECTORY_URL=http://localhost:5600/simple-directory
      - SECRET_IDENTITIES=secret-identities
      - SECRET_EVENTS=secret-events
      - SECRET_SENDMAILS=secret-sendmails
      - OBSERVER_ACTIVE=false

  openapi-viewer:
    profiles:
      - dev
    image: ghcr.io/data-fair/openapi-viewer:master
    environment:
      - PORT=8084
      - USE_SIMPLE_DIRECTORY=true
      - ALLOWED_URLS={"processings":"http://localhost:5600/processings/api/v1/api-docs.json","processingsId":"http://localhost:5600/processings/api/v1/processings/{id}/api-docs.json","processingsAdmin":"http://localhost:5600/processings/api/v1/admin/api-docs.json"}

  #####
  # db and search engine
  #####

  elasticsearch:
    profiles:
      - dev
      - test
    image: ghcr.io/data-fair/elasticsearch:7.x
    ports:
      - 9200:9200
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_HEAP_SIZE=128m
      - "ES_JAVA_OPTS=-Xms128m -Xmx128m -server"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      start_period: 10s
      timeout: 5s
      interval: 2s
      retries: 50

  mongo:
    profiles:
      - dev
      - test
    image: mongo:4.2
    ports:
      - 27017:27017
    volumes:
      - mongo-data:/data/db

  #####
  # Api and worker in docker mode
  #####

  main:
    build:
      context: .
      dockerfile: Dockerfile
      target: main
      args:
        NODE_ENV: development
    depends_on:
      - data-fair
    profiles:
      - testImages
    image: datafair/processings/main:dev
    network_mode: host
    environment:
      - NODE_ENV=development
    volumes:
      - processings-data:/app/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
      args:
        NODE_ENV: development
    depends_on:
      - data-fair
    profiles:
      - testImages
    image: datafair/processings/worker:dev
    network_mode: host
    environment:
      - NODE_ENV=development
    volumes:
      - processings-data:/app/data

volumes:
  elasticsearch-data:
  mongo-data:
  processings-data:
